<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" role="img" aria-labelledby="title desc">
  <title id="title">Emby Library Cover</title>
  <desc id="desc">Bright blue and green Emby plugin icon</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5BD6A2"/>
      <stop offset="0.52" stop-color="#38BFC3"/>
      <stop offset="1" stop-color="#4B91E3"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#62D84E"/>
      <stop offset="1" stop-color="#36B958"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#145A73" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="800" height="600" rx="88" fill="url(#background)"/>
  <circle cx="400" cy="300" r="218" fill="#FFFFFF" fill-opacity="0.12"/>
  <g filter="url(#shadow)">
    <path d="M170 300 265 205 360 300 265 395Z" fill="url(#mark)"/>
    <path d="M244 252 244 348 321 300Z" fill="#FFFFFF"/>
    <text x="382" y="334" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="116" font-weight="700" letter-spacing="-5">emby</text>
  </g>
  <text x="400" y="458" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.88" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="600" letter-spacing="7">LIBRARY COVER</text>
</svg>
